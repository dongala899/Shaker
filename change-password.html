<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiDat InfoSystems - Change Password</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/server-session.js"></script>
</head>
<body>
  <header>
    <img
      class="site-header-logo"
      src="assets/Logo.jpeg"
      alt="DigiDat InfoSystems"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
    >
    <h1 class="site-header-fallback">DigiDat InfoSystems</h1>
    <p>Account Security</p>
  </header>

  <main class="container auth-container">
    <section class="auth-card">
      <h2>Change Password</h2>
      <p class="auth-note">Update your password for invoice portal access.</p>
      <p class="auth-defaults">Logged in as: <strong id="passwordUsername">admin</strong></p>

      <form id="changePasswordForm" class="auth-form">
        <div class="form-group">
          <label for="currentPassword">Current Password</label>
          <input type="password" id="currentPassword" autocomplete="current-password" required>
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" autocomplete="new-password" minlength="6" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" autocomplete="new-password" minlength="6" required>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary">Update Password</button>
          <button type="button" class="btn btn-warning" id="backToAppBtn">Back to App</button>
        </div>
      </form>

      <p id="changePasswordError" class="auth-error" aria-live="polite"></p>
      <p id="changePasswordSuccess" class="auth-success" aria-live="polite"></p>

      <p class="auth-link-row">
        Login alias:
        <a href="login.html" class="auth-app-link">login.html</a>
      </p>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loginAlias = "login.html";
      const appPage = "app.html";

      if (!window.isAuthenticated || !window.isAuthenticated()) {
        window.location.replace(loginAlias);
        return;
      }

      const authRecord = typeof window.getAuthRecord === "function" ? window.getAuthRecord() : null;
      const credentials = typeof window.getLoginCredentials === "function" ? window.getLoginCredentials() : null;

      const usernameLabel = document.getElementById("passwordUsername");
      const form = document.getElementById("changePasswordForm");
      const currentPasswordInput = document.getElementById("currentPassword");
      const newPasswordInput = document.getElementById("newPassword");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const backToAppBtn = document.getElementById("backToAppBtn");
      const errorEl = document.getElementById("changePasswordError");
      const successEl = document.getElementById("changePasswordSuccess");

      const activeUsername =
        (authRecord && authRecord.username) ||
        (credentials && credentials.username) ||
        "admin";
      usernameLabel.textContent = activeUsername;

      backToAppBtn.addEventListener("click", () => {
        window.location.href = appPage;
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        successEl.textContent = "";

        const currentPassword = currentPasswordInput.value;
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!currentPassword || !newPassword || !confirmPassword) {
          errorEl.textContent = "Fill all password fields.";
          return;
        }

        if (newPassword !== confirmPassword) {
          errorEl.textContent = "New password and confirm password do not match.";
          return;
        }

        if (typeof window.changePassword !== "function") {
          errorEl.textContent = "Password service is unavailable. Refresh and try again.";
          return;
        }

        const result = window.changePassword(currentPassword, newPassword);
        if (!result || result.ok !== true) {
          errorEl.textContent = (result && result.message) || "Unable to update password.";
          return;
        }

        form.reset();
        successEl.textContent = "Password updated successfully.";
      });
    });
  </script>
</body>
</html>
